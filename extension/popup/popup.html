<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYA Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e8e8e8;
      padding: 20px 18px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
    }

    .status-text {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    input:checked + .slider {
      background: #e53e3e;
    }

    input:checked + .slider.dev {
      background: #7c3aed;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }

    .footer {
      margin-top: 16px;
      font-size: 10px;
      color: #3a3a45;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a30;
      margin: 12px 0;
    }

    /* Settings Form */
    .settings-section {
      margin-top: 12px;
      background: #151518;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .settings-title {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      background: #0f0f11;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 8px;
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }

    .form-group select:focus,
    .form-group input:focus {
      border-color: #555;
    }

    .hidden {
      display: none !important;
    }

    .btn-save {
      width: 100%;
      background: #2ea043;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: #3fb950;
    }

    .save-status {
      font-size: 11px;
      color: #3fb950;
      text-align: center;
      margin-top: 6px;
      min-height: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">⚠ SYA Detector</div>
    <div class="subtitle">Sycophantic Agreement Detection</div>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Detection</div>
      <div class="status-text" id="status-text">Loading…</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <hr class="divider" />

  <div class="toggle-row">
    <div>
      <div class="toggle-label">🛠 Developer Mode</div>
      <div class="status-text" id="devmode-status-text">Shows LLM reasoning per turn</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="devmode-toggle" />
      <span class="slider dev"></span>
    </label>
  </div>

  <div class="settings-section">
    <div class="settings-title">Provider Config</div>

    <div class="form-group">
      <label>Provider</label>
      <select id="provider-select">
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
        <option value="ollama">Ollama (Local)</option>
        <option value="custom">Custom (Compatible)</option>
      </select>
    </div>

    <div class="form-group hidden" id="group-type">
      <label>API Type</label>
      <select id="provider-type">
        <option value="openai">OpenAI Compatible</option>
        <option value="anthropic">Anthropic Compatible</option>
      </select>
    </div>

    <div class="form-group hidden" id="group-url">
      <label>Base URL</label>
      <input type="text" id="provider-url" placeholder="https://..." />
    </div>

    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="provider-key" placeholder="sk-..." />
    </div>

    <div class="form-group">
      <label>Model Name</label>
      <input type="text" id="provider-model" placeholder="claude-3-5-sonnet-20241022" />
    </div>

    <button class="btn-save" id="btn-save">Save Settings</button>
    <div class="save-status" id="save-status"></div>
  </div>

  <div class="footer">chatgpt.com · localhost:8000</div>

  <script src="popup.js"></script>
</body>
</html>
